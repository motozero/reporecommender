<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Repo Recommender: enhance your website with open source</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <nav class="topnav">
      <a class="brand" href="/">
        <span class="radar" aria-hidden="true"></span>
        <span>Repo<span class="accent">Recommender</span></span>
      </a>
      <div class="navlinks">
        <a href="/faq">FAQ</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
      </div>
    </nav>

    <main class="wrap">
      <section class="hero">
        <h1>Enhance your website with the right open source.</h1>
        <p class="pitch">Say what you want to add and get the open source that does it. Do it for your
          own site, or pitch it for someone else's, even as paid work.</p>
      </section>

      <form id="form" class="finder">
        <div class="field">
          <label for="repoUrl">Target website (or repo)</label>
          <input id="repoUrl" name="repoUrl" type="text" autocomplete="off"
            placeholder="https://yoursite.com  or  github.com/owner/repo" required />
        </div>
        <div class="field">
          <label for="goal">What do you want to add?</label>
          <input id="goal" name="goal" type="text" autocomplete="off"
            placeholder="video avatars, payments, test suite" required maxlength="300" />
        </div>
        <button id="submit" type="submit">Find enhancements</button>
      </form>

      <div class="examples">
        <span class="examples-label">Or try one:</span>
        <button type="button" class="example" data-site="getlocalgems.com" data-goal="test suite">
          getlocalgems.com <span class="ex-goal">test suite</span>
        </button>
        <button type="button" class="example" data-site="letsgochristo.com" data-goal="video avatars">
          letsgochristo.com <span class="ex-goal">video avatars</span>
        </button>
        <button type="button" class="example" data-site="blogcast.io" data-goal="payments">
          blogcast.io <span class="ex-goal">payments</span>
        </button>
      </div>

      <p id="status" class="status" hidden></p>
      <section id="source" class="source" hidden></section>
      <section id="results" class="grid" aria-live="polite"></section>
    </main>

    <footer class="foot">
      <span>Built in the open with Claude Code.</span>
      <a href="https://github.com/motozero/reporecommender" target="_blank" rel="noopener">Source and lessons</a>
    </footer>
    <script src="/app.js"></script>
  </body>
</html>
